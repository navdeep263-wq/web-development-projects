<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact form page</title>
</head>
<body style="background-color: rgb(182, 181, 211);">
    <h1 style="margin: 50px; text-align: center;">Contact Form</h1>
    <form style="border: 2px solid black; padding: 30px; width: 400px; background-color:rgb(144, 133, 233); border-radius:20px ; margin: auto;">
        <label for="name" style="font-size: 18px;">Name :</label>
        <input type="text" placeholder="Enter your name" style="width: 250px; height: 30px; border: 2px solid black;">
        <br><br>
        <label for="email" style="font-size: 18px;">E-mail :</label>
        <input type="email" placeholder="Enter your E-mail" style="width: 250px; height: 30px; border: 2px solid black;">
        <br><br>
        <label for="phone number" style="font-size: 18px;">Phone Number :</label>
        <input type="number" placeholder="Enter the Phone number" style="width: 250px; height: 30px; border: 2px solid black;">
        <br><br>
        <label for="password" style="font-size: 18px;">Password</label>
        <input type="password" placeholder="Enter the password" style="width: 250px; height: 30px; border: 2px solid black;">
        <br><br>
       <div style="text-align: center;"> <button type="submit" style="width: 120px; height: 40px; border-radius: 5px; color: black; background-color: rgb(83, 83, 202);">Submit</button></div>
    </form>
</body>
</html>
